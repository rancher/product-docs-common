name: Test deployment (minimum validations)

on:
  workflow_call:
    inputs:
      playbook-name:
        default: 'playbook-local.yml'
        required: false
        type: string
    secrets:
      token:
        required: true

jobs:
  test-deploy:
    name: Test deployment (minimum validations)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Checkout helper scripts
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: rancher/product-docs-common
          ref: main
          sparse-checkout: |
            scripts
          sparse-checkout-cone-mode: false
          path: helpers

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Check revdate
        uses: rancher/product-docs-common/.github/actions/check-revdate-composite-action@bef76c9aab79980088a221e72e006acd3bfd8257 # main
        with:
          token: ${{ secrets.token }}

      - name: Install Antora and dependencies
        run: make environment

      - name: Generate Site
        run: |
          npx antora --stacktrace \
            --log-format=pretty \
            --log-level=info \
            ${{ inputs.playbook-name }}
            
